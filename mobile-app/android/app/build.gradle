plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "com.facebook.react"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("gradle.properties")

if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { keystoreProperties.load(it) }
}

react {
    debuggableVariants = ["debug"]
}

android {
    namespace "com.steelestimate"
    compileSdk 34

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.steelestimate"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"

        missingDimensionStrategy "react-native-camera", "general"
        vectorDrawables {
            useSupportLibrary true
        }
    }

    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
        release {
            def storeFileName = keystoreProperties["MYAPP_UPLOAD_STORE_FILE"] ?: "release.keystore"
            def storePasswordValue = keystoreProperties["MYAPP_UPLOAD_STORE_PASSWORD"] ?: "changeit-store-password"
            def keyAliasValue = keystoreProperties["MYAPP_UPLOAD_KEY_ALIAS"] ?: "steelestimate"
            def keyPasswordValue = keystoreProperties["MYAPP_UPLOAD_KEY_PASSWORD"] ?: "changeit-key-password"

            storeFile file(storeFileName)
            storePassword storePasswordValue
            keyAlias keyAliasValue
            keyPassword keyPasswordValue
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging false
        }
    }

    splits {
        abi {
            enable true
            reset()
            include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
            universalApk true
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.google.android.material:material:1.11.0")
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation("org.webkit:android-jsc:+")
    }
}
